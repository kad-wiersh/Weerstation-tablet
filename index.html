<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0B1220">
<title>14-daagse weerverwachting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B1220; 
    --cloud:#F4F7FA; 
    --muted:#93A2BE;
    --gold:#F5B942; 
    --coral:#FF8A5B; 
    --blue:#7FC4FF;
    --line: rgba(244,247,250,0.14); 
    --panel: rgba(244,247,250,0.06);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; min-height:100%; width:100%;
    background: linear-gradient(160deg, #0B1220, #1B2A4A);
    color: var(--cloud); font-family:'Inter', system-ui, sans-serif;
    overscroll-behavior:none;
  }
  .app{ min-height:100vh; display:flex; flex-direction:column; padding: 3vh 3vw 3vh 3vw; }

  .topbar{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.4vh;}
  .place{font-family:'Space Grotesk', sans-serif; font-weight:600; font-size: clamp(16px, 2vw, 24px);}
  .place small{display:block; font-family:'IBM Plex Mono', monospace; font-weight:400;
    font-size: clamp(10px,1.1vw,13px); color: var(--muted); letter-spacing:.08em; margin-top:2px;}
  .title{font-family:'Space Grotesk'; font-weight:500; color:var(--muted); font-size:clamp(12px,1.3vw,15px); margin-top:6px;}

  .legend{display:flex; gap:18px; align-items:center; flex-wrap:wrap;}
  .leg{display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono'; font-size:clamp(10px,1vw,12px); color:var(--muted);}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block;}

  .chartwrap{
    flex:1; overflow-x:auto; -webkit-overflow-scrolling:touch;
    border-top:1px solid var(--line); border-bottom:1px solid var(--line);
    padding: 1.4vh 0;
  }
  .chartwrap::-webkit-scrollbar{height:6px;}
  .chartwrap::-webkit-scrollbar-thumb{background:var(--panel); border-radius:6px;}
  svg#chart text{font-family:'IBM Plex Mono', monospace; fill:var(--cloud);}
  svg#chart .daylabel{font-family:'Space Grotesk', sans-serif; font-weight:600; fill:var(--cloud);}
  svg#chart .datelabel{fill:var(--cloud); font-size:11px;}

  .footer{display:flex; justify-content:space-between; align-items:center; margin-top:1.6vh;}
  .updated{font-family:'IBM Plex Mono'; font-size:clamp(9px,0.9vw,11px); color:var(--muted);}
  .updated.offline{color:var(--coral);}
  .iconbtn{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); cursor:pointer;
  }
  .iconbtn svg{width:16px; height:16px;}

  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:5; display:none; align-items:center; justify-content:center;}
  .overlay.show{display:flex;}
  .panel{background:#101a30; border:1px solid var(--line); border-radius:18px; padding:24px 26px; width:min(90vw, 380px); font-family:'Inter';}
  .panel h3{font-family:'Space Grotesk'; margin:0 0 14px 0; font-size:18px;}
  .panel label{display:block; font-size:12px; color:var(--muted); margin:12px 0 4px;}
  .panel input{width:100%; padding:9px 10px; border-radius:8px; border:1px solid var(--line); background:#0B1220; color:var(--cloud); font-family:'IBM Plex Mono'; font-size:14px;}
  .panel-btns{display:flex; gap:10px; margin-top:18px;}
  .btn{flex:1; padding:10px; border-radius:9px; border:none; font-family:'Space Grotesk'; font-weight:600; cursor:pointer; font-size:14px;}
  .btn.primary{background:var(--gold); color:#1a1300;}
  .btn.ghost{background:transparent; color:var(--muted); border:1px solid var(--line);}
  .hint{font-size:11px; color:var(--muted); margin-top:14px; line-height:1.5;}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <div class="place"><span id="placeName">Rijssen</span><small id="coords">52.32°N 6.52°O</small></div>
      <div class="title">Verwachting komende 14 dagen</div>
    </div>
    <div class="legend">
      <div class="leg"><span class="dot" style="background:var(--gold)"></span>Max</div>
      <div class="leg"><span class="dot" style="background:#C9D6F0"></span>Min</div>
      <div class="leg"><span class="dot" style="background:var(--blue)"></span>Kans op neerslag</div>
    </div>
  </div>

  <div class="chartwrap" id="chartwrap">
    <svg id="chart" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="footer">
    <div class="updated" id="updatedText">Laden…</div>
    <div class="iconbtn" id="settingsBtn" title="Instellingen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <h3>Locatie instellen</h3>
    <label>Naam (vrij te kiezen)</label>
    <input id="inName" type="text" placeholder="bv. Rijssen">
    <label>Breedtegraad (latitude)</label>
    <input id="inLat" type="text" inputmode="decimal" placeholder="52.32">
    <label>Lengtegraad (longitude)</label>
    <input id="inLon" type="text" inputmode="decimal" placeholder="6.52">
    <div class="panel-btns">
      <button class="btn ghost" id="cancelBtn">Annuleren</button>
      <button class="btn primary" id="saveBtn">Opslaan</button>
    </div>
    <div class="hint">Gebruikt dezelfde locatie-instelling als het weerstation (indien je die eerder hebt opgeslagen). Gegevens van open-meteo.com.</div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var DEFAULTS = { name: "Rijssen", lat: 52.3167, lon: 6.5167 };
  var loc = loadLocation();
  
  // screen size
  var screenW = window.innerWidth;
  var screenH = window.innerHeight;

  function loadLocation(){
    try{ var raw = localStorage.getItem("ws_location"); if(raw) return JSON.parse(raw); }catch(e){}
    return DEFAULTS;
  }
  function saveLocation(l){
    loc = l;
    try{ localStorage.setItem("ws_location", JSON.stringify(l)); }catch(e){}
  }
  function loadCache(){
    try{ var raw = localStorage.getItem("wg_cache"); if(raw) return JSON.parse(raw); }catch(e){}
    return null;
  }
  function saveCache(d){ try{ localStorage.setItem("wg_cache", JSON.stringify(d)); }catch(e){} }

  var DAGEN = ["zo","ma","di","wo","do","vr","za"];
  var MAANDEN = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];

  var WCODE = {
    0:["Helder","sun"], 1:["Overwegend helder","sun-cloud"], 2:["Half bewolkt","sun-cloud"],
    3:["Bewolkt","cloud"], 45:["Mist","fog"], 48:["Rijp mist","fog"],
    51:["Lichte motregen","rain"], 53:["Motregen","rain"], 55:["Zware motregen","rain"],
    56:["Lichte ijzel","rain"], 57:["IJzel","rain"],
    61:["Lichte regen","rain"], 63:["Regen","rain"], 65:["Zware regen","rain"],
    66:["Lichte ijsregen","rain"], 67:["IJsregen","rain"],
    71:["Lichte sneeuw","snow"], 73:["Sneeuw","snow"], 75:["Zware sneeuw","snow"], 77:["Sneeuwkorrels","snow"],
    80:["Lichte buien","rain"], 81:["Buien","rain"], 82:["Zware buien","rain"],
    85:["Lichte sneeuwbuien","snow"], 86:["Zware sneeuwbuien","snow"],
    95:["Onweer","thunder"], 96:["Onweer met hagel","thunder"], 99:["Zwaar onweer","thunder"]
  };
  function wInfo(code){ return WCODE[code] || ["Onbekend","cloud"]; }

  // icon path fragments only (no outer <svg>), reused inside nested <svg> elements
  var ICONS = {
    "sun": '<circle cx="12" cy="12" r="4.6"/><path d="M12 1.5v3M12 19.5v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M1.5 12h3M19.5 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>',
    "sun-cloud": '<circle cx="8" cy="8" r="3.2"/><path d="M8 2.5v1.6M3 8h1.6M8 13.4v-1M3.6 4.6l1.1 1.1M12.4 4.6l-1.1 1.1"/><path d="M9.5 19a4.2 4.2 0 0 1-.4-8.38A5.1 5.1 0 0 1 18.7 9.4 3.7 3.7 0 0 1 19.7 16.6"/><path d="M9.5 19h9.2"/>',
    "cloud": '<path d="M6.5 18a4.5 4.5 0 0 1-.5-8.98A5.5 5.5 0 0 1 16.4 8.1 4 4 0 0 1 17.5 16v0"/><path d="M6.5 18h11"/>',
    "rain": '<path d="M6.5 15.5a4.5 4.5 0 0 1-.5-8.98A5.5 5.5 0 0 1 16.4 7.6 4 4 0 0 1 17.5 15.5"/><path d="M8 18.5l-1 2.2M12 18.5l-1 2.2M16 18.5l-1 2.2"/>',
    "snow": '<path d="M6.5 15.5a4.5 4.5 0 0 1-.5-8.98A5.5 5.5 0 0 1 16.4 7.6 4 4 0 0 1 17.5 15.5"/><path d="M8 18v3M8 18l-1.6 1M8 18l1.6 1M12 18v3M12 18l-1.6 1M12 18l1.6 1M16 18v3M16 18l-1.6 1M16 18l1.6 1"/>',
    "fog": '<path d="M6.5 12a4.5 4.5 0 0 1-.5-8.98A5.5 5.5 0 0 1 16.4 4.1 4 4 0 0 1 17.5 11"/><path d="M3.5 15h17M3.5 18.5h17M3.5 21.5h13"/>',
    "thunder": '<path d="M6.5 13.5a4.5 4.5 0 0 1-.5-8.98A5.5 5.5 0 0 1 16.4 5.1 4 4 0 0 1 17.5 13"/><path d="M12.5 14.5l-3 4.5h2.6l-1.6 3.5 4.4-5.5h-2.6z"/>'
  };

  // thermal color scale: interpolate hex colors across temperature stops
  var STOPS = [[-10,"#3E6FE0"], [0,"#4FA8E0"], [10,"#7FC4FF"], [18,"#F5D76E"], [25,"#F5B942"], [32,"#FF8A5B"], [40,"#E0524A"]];
  function hexToRgb(h){
    h=h.replace("#",""); 
    return [parseInt(h.substr(0,2),16), parseInt(h.substr(2,2),16), parseInt(h.substr(4,2),16)]; }
  function rgbToHex(r,g,b){ 
    function h(n){ 
      n=Math.max(0,Math.min(255,Math.round(n))).toString(16); 
      return n.length<2?"0"+n:n; 
      } 
    return "#"+h(r)+h(g)+h(b); 
    }
  function tempColor(t){
    if(t <= STOPS[0][0]) return STOPS[0][1];
    if(t >= STOPS[STOPS.length-1][0]) return STOPS[STOPS.length-1][1];
    for(var i=0;i<STOPS.length-1;i++){
      var a = STOPS[i], b = STOPS[i+1];
      if(t >= a[0] && t <= b[0]){
        var f = (t-a[0])/(b[0]-a[0]);
        var ca = hexToRgb(a[1]), cb = hexToRgb(b[1]);
        return rgbToHex(ca[0]+(cb[0]-ca[0])*f, ca[1]+(cb[1]-ca[1])*f, ca[2]+(cb[2]-ca[2])*f);
      }
    }
    return "#F5B942";
  }

  var DROPLET_PATH = 'M12 2s7 8.5 7 13a7 7 0 1 1-14 0c0-4.5 7-13 7-13z';

  function dropletsFilled(pop){
    if(pop >= 71) return 3;
    if(pop >= 41) return 2;
    if(pop >= 15) return 1;
    return 0;
  }

  // the color of the sunshine rect
  var SUN_LOW = [0xFB,0xF3,0xC7], SUN_HIGH = [0xFF,0xC3,0x00];
  function sunColor(pct){
    pct = Math.max(0, Math.min(100, pct)) / 100;
    var r = SUN_LOW[0] + (SUN_HIGH[0]-SUN_LOW[0])*pct;
    var g = SUN_LOW[1] + (SUN_HIGH[1]-SUN_LOW[1])*pct;
    var b = SUN_LOW[2] + (SUN_HIGH[2]-SUN_LOW[2])*pct;
    return rgbToHex(r,g,b);
  }

  // the color of the wind arrow
  var WIND_LOW = [0x93,0xA2,0xBE], WIND_HIGH = [0xFF,0x8A,0x5B];
  function windColor(speed){
    var pct = Math.max(0, Math.min(50, speed)) / 50;
    var r = WIND_LOW[0] + (WIND_HIGH[0]-WIND_LOW[0])*pct;
    var g = WIND_LOW[1] + (WIND_HIGH[1]-WIND_LOW[1])*pct;
    var b = WIND_LOW[2] + (WIND_HIGH[2]-WIND_LOW[2])*pct;
    return rgbToHex(r,g,b);
  }
  
  // the width of the wind arrow
  function windStrokeWidth(speed){
    if(speed >= 45) return 8;
    if(speed >= 30) return 6.5;
    if(speed >= 20) return 5;
    if(speed >= 10) return 3.5;
    return 2;
  }

  function svgEl(tag, attrs){
    var el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for(var k in attrs){ el.setAttribute(k, attrs[k]); }
    return el;
  }
  // onderstaande functie svgTxt werkt (nog) niet
  function svgTxt (attrs, text){
    var el = svgEl("text", attrs);
        el.textContent = text;
        return el;
  }

  function buildChart(daily){
    var n = Math.min(14, daily.time.length); // nr of days, max 14
    var colW = 92, marginL = 20, marginR = 20;  // total width is 14*92+20+20=1328
    var marginTop = 16;
    var sunTop = marginTop, sunW = 50;
    var iconTop = marginTop, iconSize = 34;
    var dropTop = iconTop + iconSize, dropSize = 15;
    var windSize = 24, windY = dropTop + dropSize + windSize/2; // windY is center of arrow
    var sunH = iconSize + dropSize + windSize;
    var barTop = marginTop + sunH; 
    var barHeight = 250; // orig 150
    var barBottom = barTop + barHeight;
    var dayLabelY = barBottom + 16;
    var dateLabelY = dayLabelY + 16;
    var totalH = dateLabelY + 14;
    var totalW = marginL + n*colW + marginR;



    var tmax = daily.temperature_2m_max;
    var tmin = daily.temperature_2m_min;
    var gMax = Math.max.apply(null, tmax.slice(0,n)) + 10; // orig +3
    var gMin = Math.min.apply(null, tmin.slice(0,n)) - 10; // orig -3
    function tempToY(t){ return barTop + (gMax - t) / (gMax - gMin) * (barBottom - barTop); }

    var svg = document.getElementById("chart");
    svg.setAttribute("viewBox", "0 0 " + totalW + " " + totalH);
    svg.setAttribute("width", totalW);
    svg.setAttribute("height", totalH);
    svg.innerHTML = "";

    // diagnostics
    svg.appendChild(svgTxt({x:marginL, y:10, "text-anchor":"left", "font-size":15, "font-weight":600, "fill":"#93A2BE"}, "screenW="+screenW+" screenH="+screenH));
    // svg.appendChild(svgEl("line", {x1:marginL+5, y1:windY, x2:marginL+150, y2:windY, stroke:"rgba(0,0,0,1)", "stroke-width":1, "stroke-dasharray":"4,5"}));
    // svg.appendChild(svgEl("rect", {x:marginL, y:barTop, width:n*colW, height:barBottom - barTop, rx:3, fill:"black"}));

    // faint gridlines across the temperature area
    /*
    var gridCount = 4;
    for(var g=0; g<=gridCount; g++){
      var gy = barTop + (barBottom-barTop)*g/gridCount;
      svg.appendChild(svgEl("line", {x1:marginL, y1:gy, x2:totalW-marginR, y2:gy, stroke:"rgba(181,185,189,0.5)", "stroke-width":1, "stroke-dasharray":"4,5"}));
    }
    */
    for(var t=-30; t<50; t=t+10){
      if(t>=gMin && t<=gMax){
        var gy = tempToY (t);
        svg.appendChild(svgEl("line", {x1:marginL+5, y1:gy, x2:totalW-marginR, y2:gy, stroke:"rgba(181,185,189,0.5)", "stroke-width":1, "stroke-dasharray":"4,5"}));
        svg.appendChild(svgTxt({x:marginL-10, y:gy+5, "text-anchor":"middle", "font-size":15, "font-weight":600, "fill":"#93A2BE"}, t));
        }
      }

    // walk the days
    var maxPts = [], minPts = [];
    for(var i=0;i<n;i++){
      var cx = marginL + i*colW + colW/2;
      var d = new Date(daily.time[i]);
      var info = wInfo(daily.weather_code[i]);
      var maxY = tempToY(tmax[i]);
      var minY = tempToY(tmin[i]);
      var col = tempColor(tmax[i]);
      var colLo = tempColor(tmin[i]);
      
      // sun-chance rect: brightness of yellow reflects share of daylight with sunshine, start at sunTop
      var sunPct = 0;
      if(daily.daylight_duration && daily.daylight_duration[i] > 0){
        sunPct = Math.round(100 * (daily.sunshine_duration[i] || 0) / daily.daylight_duration[i]);
      }
      svg.appendChild(svgEl("rect", {x:cx-sunW/2, y:sunTop, width:sunW, height:sunH, rx:3, fill:sunColor(sunPct)}));
      // var sunLbl = svgEl("text", {x:cx, y:sunLabelY, "text-anchor":"middle", "font-size":10});
      // sunLbl.setAttribute("fill", "#93A2BE");
      // sunLbl.textContent = sunPct + "%";
      // svg.appendChild(sunLbl);
      
      // icons, start at iconTop
      var isvg = svgEl("svg", {x:cx-iconSize/2, y:iconTop, width:iconSize, height:iconSize, viewBox:"0 0 24 24", fill:"none", stroke:"#F4F7FA", "stroke-width":1.6});
      isvg.innerHTML = ICONS[info[1]] || ICONS["cloud"];
      svg.appendChild(isvg);
      // trend lines
      maxPts.push(cx + "," + maxY);
      minPts.push(cx + "," + minY);
      
      // rain-chance droplet indicator (3 droplets, filled count = level of rain chance), start at dropTop
      var pop = daily.precipitation_probability_max[i] || 0;
      var filled = dropletsFilled(pop);
      for(var dsp=0; dsp<3; dsp++){ // 3 droplets
        var dx = cx + (dsp-1)*15 - dropSize/2; // drops are 15 wide
        var isFilled = dsp < filled;
        var dsvg = svgEl("svg", {x:dx, y:dropTop, width:dropSize, height:dropSize, viewBox:"0 0 24 24",
          fill: isFilled ? "#7FC4FF" : "none",
          stroke: isFilled ? "#7FC4FF" : "rgba(147,162,190,0.55)",
          "stroke-width":1.6});
        dsvg.innerHTML = '<path d="' + DROPLET_PATH + '"/>';
        svg.appendChild(dsvg);
      }
      
      // wind arrow: rotation shows where the wind blows to, thickness/size shows strength, center is windY, height=windSize=24
      var windSpeed = (daily.wind_speed_10m_max && daily.wind_speed_10m_max[i]) || 0;
      var windDir = (daily.wind_direction_10m_dominant && daily.wind_direction_10m_dominant[i]) || 0;
      var wCol = windColor(windSpeed);
      var wW = windStrokeWidth(windSpeed);
      var headHalf = wW*1.5 + 3;
      var rotation = windDir + 180; // "from" direction -> arrow points where the wind is going
      var wg = svgEl("g", {transform:"rotate(" + rotation + " " + cx + " " + windY + ")"});
      wg.appendChild(svgEl("line", {x1:cx, y1:windY+11, x2:cx, y2:windY-8, stroke:wCol, "stroke-width":wW, "stroke-linecap":"round"}));
      wg.appendChild(svgEl("polygon", {points: (cx-headHalf)+","+(windY-6)+" "+(cx+headHalf)+","+(windY-6)+" "+cx+","+(windY-15), fill:wCol}));
      svg.appendChild(wg);
      
      // temp range bar with dots on the end, starting at barTop
      svg.appendChild(svgEl("line", {x1:cx, y1:maxY, x2:cx, y2:minY, stroke:col, "stroke-width":7, "stroke-linecap":"round", opacity:"0.9"}));
      svg.appendChild(svgEl("circle", {cx:cx, cy:maxY, r:4.5, fill:col}));
      svg.appendChild(svgEl("circle", {cx:cx, cy:minY, r:4.5, fill:"#C9D6F0"}));

      // max/min value labels
      // var maxLbl = svgEl("text", {x:cx, y:maxLabelY, "text-anchor":"middle", "font-size":15, "font-weight":600});
      var maxLbl = svgEl("text", {x:cx, y:maxY-10, "text-anchor":"middle", "font-size":15, "font-weight":600});
      maxLbl.setAttribute("class","daylabel");
      maxLbl.textContent = Math.round(tmax[i]) + "°";
      maxLbl.setAttribute("fill", col);
      svg.appendChild(maxLbl);

      // var minLbl = svgEl("text", {x:cx, y:minLabelY, "text-anchor":"middle", "font-size":13});
      var minLbl = svgEl("text", {x:cx, y:minY+20, "text-anchor":"middle", "font-size":13});
      minLbl.textContent = Math.round(tmin[i]) + "°";
      minLbl.setAttribute("fill", "#93A2BE");
      svg.appendChild(minLbl);

      
/*
      // neerslag balk
      var pop = daily.precipitation_probability_max[i] || 0;
      var barH = popMaxH * (pop/100);
      svg.appendChild(svgEl("rect", {x:cx-11, y:popBaseline-barH, width:22, height:barH, rx:4, fill:"#7FC4FF", opacity:"0.85"}));
      // var popLbl = svgEl("text", {x:cx, y:popBaseline-barH-6, "text-anchor":"middle"});
      var popLbl = svgEl("text", {x:cx, y:popBaseline+10, "text-anchor":"middle"});
      popLbl.setAttribute("class","poplabel");
      popLbl.textContent = pop > 0 ? pop + "%" : "";
      svg.appendChild(popLbl);
*/





      // background color of the weekend day
      if(DAGEN[d.getDay()] === "za" || DAGEN[d.getDay()] === "zo"){
        svg.appendChild(svgEl("rect", {x:cx-colW/2, y:dayLabelY-10, width:colW, height:40, rx:3, fill:"black"}));
      }
      
      // day + date label
      var dayLbl = svgEl("text", {x:cx, y:dayLabelY, "text-anchor":"middle", "font-size":13});
      dayLbl.setAttribute("class","daylabel");
      dayLbl.textContent = i === 0 ? "Vandaag" : DAGEN[d.getDay()];
      svg.appendChild(dayLbl);

      var dateLbl = svgEl("text", {x:cx, y:dateLabelY, "text-anchor":"middle"});
      dateLbl.setAttribute("class","datelabel");
      dateLbl.textContent = d.getDate() + " " + MAANDEN[d.getMonth()];
      svg.appendChild(dateLbl);
    }

    // trend lines connecting the tops and bottoms across days
    svg.appendChild(svgEl("polyline", {points:maxPts.join(" "), fill:"none", stroke:"rgba(245,185,66,0.35)", "stroke-width":1.5}));
    svg.appendChild(svgEl("polyline", {points:minPts.join(" "), fill:"none", stroke:"rgba(201,214,240,0.28)", "stroke-width":1.5}));
    // move trend lines behind bars
    svg.insertBefore(svg.lastChild, svg.firstChild);
    svg.insertBefore(svg.lastChild, svg.firstChild);
  }

  function setUpdated(ok){
    var el = document.getElementById("updatedText");
    var now = new Date();
    function pad(n){ return n<10?"0"+n:""+n; }
    var stamp = pad(now.getHours())+":"+pad(now.getMinutes());
    if(ok){ el.textContent = "Bijgewerkt " + stamp; el.className = "updated"; }
    else { el.textContent = "Offline — laatste gegevens van " + stamp; el.className = "updated offline"; }
  }

  function fetchData(){
    document.getElementById("placeName").textContent = loc.name;
    document.getElementById("coords").textContent = Number(loc.lat).toFixed(2) + "°N " + Number(loc.lon).toFixed(2) + "°O";

    var url = "https://api.open-meteo.com/v1/forecast" +
      "?latitude=" + encodeURIComponent(loc.lat) +
      "&longitude=" + encodeURIComponent(loc.lon) +
      "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunshine_duration,daylight_duration" +
      "&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunshine_duration,daylight_duration,wind_speed_10m_max,wind_direction_10m_dominant" +
      "&timezone=auto&forecast_days=14";

    fetch(url).then(function(r){
      if(!r.ok) throw new Error("HTTP "+r.status);
      return r.json();
    }).then(function(data){
      buildChart(data.daily);
      saveCache(data);
      setUpdated(true);
    }).catch(function(err){
      console.error("Ophalen mislukt:", err);
      var cached = loadCache();
      if(cached) buildChart(cached.daily);
      setUpdated(false);
    });
  }

  function openPanel(){
    document.getElementById("inName").value = loc.name;
    document.getElementById("inLat").value = loc.lat;
    document.getElementById("inLon").value = loc.lon;
    document.getElementById("overlay").classList.add("show");
  }
  function closePanel(){ document.getElementById("overlay").classList.remove("show"); }
  document.getElementById("settingsBtn").addEventListener("click", openPanel);
  document.getElementById("cancelBtn").addEventListener("click", closePanel);
  document.getElementById("saveBtn").addEventListener("click", function(){
    var name = document.getElementById("inName").value.trim() || "Locatie";
    var lat = parseFloat(document.getElementById("inLat").value);
    var lon = parseFloat(document.getElementById("inLon").value);
    if(isNaN(lat) || isNaN(lon)){ alert("Vul geldige coördinaten in."); return; }
    saveLocation({name:name, lat:lat, lon:lon});
    closePanel();
    fetchData();
  });

  var cached = loadCache();
  if(cached) buildChart(cached.daily);
  fetchData();
  setInterval(fetchData, 30*60*1000); // elke 30 minuten

})();
</script>
